name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Theos
        run: |
          # Install dependencies
          brew install ldid dpkg coreutils
          
          # Install Perl modules needed by Theos
          sudo cpan -f -i IO::Compress::Lzma 2>/dev/null || true
          sudo cpan -f -i IO::Compress::Gzip 2>/dev/null || true
          
          # Clone Theos
          cd $HOME
          if [ ! -d "theos" ]; then
            git clone --recursive https://github.com/theos/theos.git
          fi
          
          # Setup Theos bin
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          
          # Ensure dm.pl exists
          if [ ! -f "$THEOS/bin/dm.pl" ]; then
            echo "Creating dm.pl symlink..."
            ln -sf $THEOS/bin/dm.pl $THEOS/bin/dm.pl 2>/dev/null || true
          fi
          
          # Set environment variables
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
          
          echo "Theos setup complete"
          ls -la $THEOS/bin/
          
      - name: Build Tweak
        id: build
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          export THEOS=${{ env.THEOS }}
          export PATH=$THEOS/bin:$PATH
          
          cd $GITHUB_WORKSPACE
          
          # Create symlink to theos
          ln -sfn $THEOS ./theos
          
          # Build
          make clean 2>/dev/null || true
          make package 2>&1 || {
            echo "Build failed, checking for errors..."
            # Try alternative build
            make package THEOS=$THEOS 2>&1
          }
          
          echo "=== Build Output ==="
          find . -name "*.deb" -o -name "*.dylib" 2>/dev/null | head -20
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tweak-packages
          path: |
            **/*.deb
            **/*.dylib
            **/.theos/obj/debug/**/*.dylib
          retention-days: 30
          if-no-files-found: warn
          
      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts:" >> $GITHUB_STEP_SUMMARY
          find . -name "*.deb" 2>/dev/null | while read f; do
            echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
